services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bani
      POSTGRES_PASSWORD: bani
      POSTGRES_DB: bani
    ports:
      - "5432:5432"
    volumes:
      - bani_pg:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  bani_pg:
